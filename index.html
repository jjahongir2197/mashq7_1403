<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Results</title>

<style>

body {

font-family: Arial;

background-color: #f0f0f0;

padding: 20px;

}

.card {

background-color: white;

padding: 15px;

margin: 10px;

border-radius: 10px;

box-shadow: 0px 0px 5px gray;

}

.info {

margin-top: 20px;

background-color: #d9ffd9;

padding: 20px;

border-radius: 10px;

width: 60%;

}

</style>

</head>

<body>

<h1>Student Results</h1>

{% for r in results %}

<div class="card">

<h2>{{ r.name }}</h2>

<p>Score: {{ r.score }}</p>

<p>Grade: <strong>{{ r.grade }}</strong></p>

</div>

{% endfor %}

<div class="info">

<h2>Highest Score:
{{ highest.name }}
({{ highest.score }})
</h2>

<h2>Lowest Score:
{{ lowest.name }}
({{ lowest.score }})
</h2>

</div>

</body>
</html>
